version: '3.8'

name: medicore

networks:
  medicore-network:
    driver: bridge

volumes:
  postgres_iam_data:
  minio_data:

services:
  # 1. Keycloak database
  postgres-iam:
    image: postgres:15-alpine
    container_name: medicore-postgres-iam
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IAM_DB_NAME}
      POSTGRES_USER: ${IAM_DB_USER}
      POSTGRES_PASSWORD: ${IAM_DB_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - medicore-network
    volumes:
      - postgres_iam_data:/var/lib/postgresql/data

  # 2. Keycloak (Identity Provider / security)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: medicore-keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/${IAM_DB_NAME}
      KC_DB_USERNAME: ${IAM_DB_USER}
      KC_DB_PASSWORD: ${IAM_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - postgres-iam
    networks:
      - medicore-network
    volumes:
      - ./keycloak-data/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # 3. MinIO 
  minio:
    image: minio/minio:latest
    container_name: medicore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    ports:
      - "9000:9000" # Puerto para la API (Spring Boot se conecta aquí)
      - "9001:9001" # Puerto para la consola web (Tú entras por aquí)
    networks:
      - medicore-network
    volumes:
      - minio_data:/data


  # # #  Microservices
  eureka-server:
     container_name: medicore-eureka
     build: 
       context: ../medicore-eureka-server
       dockerfile: Dockerfile
     ports:
       - "8761:8761"
     environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
     healthcheck:
       test: [ "CMD", "curl", "-f", "http://localhost:8761" ]
       interval: 5s
       timeout: 3s
       retries: 5
     networks:
       - medicore-network

  config-server:
    container_name: medicore-config
    build: 
      context: ../medicore-config-server
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    depends_on:
      - eureka-server
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
       - medicore-network



  api-gateway:
     container_name: medicore-gateway
     build:
       context: ../medicore-api-gateway
       dockerfile: Dockerfile
     ports:
       - "8080:8080"
     environment:
       - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
       - CONFIG_URI=${CONFIG_URI}
       - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
       - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
       - AUTH_SERVICE_URI=http://medicore-keycloak:8080
     depends_on:
       config-server:
         condition: service_healthy
       eureka-server:
           condition: service_healthy
     networks:
       - medicore-network



  # patients' microservice and db
  patients-db:
    image: postgres:15-alpine
    container_name: medicore-patient-database
    environment:
      POSTGRES_USER: ${POSTGRES_PATIENTS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PATIENTS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_PATIENTS_DB}
    ports:
      - "5435:5432"
    networks:
      - medicore-network


  patients-service:
    container_name: medicore-patients
    build:
      context: ../medicore-patients-service
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      - CONFIG_URI=${CONFIG_URI}
      - PATIENTS_DATABASE=${PATIENTS_DATABASE}
    networks:
      - medicore-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy