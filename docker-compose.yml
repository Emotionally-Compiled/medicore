version: '3.8'

networks:
  medicore-network:
    driver: bridge

volumes:
  postgres_iam_data:
  minio_data:

services:
  # 1. Keycloak database
  postgres-iam:
    image: postgres:15-alpine
    container_name: medicore-postgres-iam
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IAM_DB_NAME}
      POSTGRES_USER: ${IAM_DB_USER}
      POSTGRES_PASSWORD: ${IAM_DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - medicore-network
    volumes:
      - postgres_iam_data:/var/lib/postgresql/data

  # 2. Keycloak (Identity Provider / security)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: 
          medicore-keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/${IAM_DB_NAME}
      KC_DB_USERNAME: ${IAM_DB_USER}
      KC_DB_PASSWORD: ${IAM_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - postgres-iam
    networks:
      - medicore-network
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json

  # 3. MinIO 
  minio:
    image: minio/minio:latest
    container_name: medicore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    ports:
      - "9000:9000" # Puerto para la API (Spring Boot se conecta aquí)
      - "9001:9001" # Puerto para la consola web (Tú entras por aquí)
    networks:
      - medicore-network
    volumes:
      - minio_data:/data


  # # #  Microservices
  eureka-server:
     container_name: medicore-eureka
     build: 
       context: ../medicore-eureka-server
       dockerfile: Dockerfile
     ports:
       - "8761:8761"
     networks:
       - medicore-network

  config-server:
    container_name: medicore-config
    build: 
      context: ../medicore-config-server
      dockerfile: dockerfile
    ports:
      - "8888:8888"
    networks:
       - medicore-network



